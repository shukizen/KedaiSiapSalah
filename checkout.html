<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kedai Siap Salah - Pesanan</title>
    <link rel="stylesheet" href="style.css?v=1781634589718">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="menu-body">
    <div class="mobile-app menu-app">
        
        <!-- Header -->
        <header class="checkout-header">
            <button class="back-btn" onclick="window.location.href='menu.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <h1 class="checkout-title">Pesanan</h1>
            <div class="placeholder-icon"></div>
        </header>

        <!-- Type Toggle (sticky, tidak ikut scroll) -->
        <div class="checkout-type-bar">
            <div class="order-type-toggle">
                <span class="order-type-label">Tipe Pemesanan</span>
                <div class="order-type-active">Makan di tempat</div>
            </div>
        </div>

        <!-- Scrollable: hanya daftar item -->
        <div class="checkout-items-scroll">
            <!-- Order Summary Section -->
            <div class="checkout-section summary-section">
                <div class="section-header">
                    <h2>Ringkasan Pesanan</h2>
                    <a href="menu.html" class="add-item-link">Tambah Item</a>
                </div>

                <div class="order-items-list" id="checkout-items">
                    <!-- Dynamic items will be rendered here -->
                </div>
            </div>

        </div>

        <!-- Sticky: rincian pembayaran + tombol -->
        <div class="checkout-sticky-bottom">
            <!-- Payment Details Section -->
            <div class="checkout-section payment-section">
                <h2>Rincian Pembayaran</h2>
                
                <div class="payment-row">
                    <span class="payment-label">Subtotal <small id="payment-items-count">(0 menu)</small></span>
                    <span class="payment-value" id="payment-subtotal">Rp 0</span>
                </div>
                
                <div class="payment-row">
                    <span class="payment-label">Pajak PPN (11%)</span>
                    <span class="payment-value" id="payment-tax">Rp 0</span>
                </div>
                
                <div class="payment-divider"></div>
                
                <div class="payment-row total-row">
                    <span class="payment-label">Total</span>
                    <span class="payment-value" id="payment-total">Rp 0</span>
                </div>
            </div>

            <!-- Checkout Bottom Bar -->
            <div class="checkout-bottom-bar-inline">
                <div class="bottom-total-info">
                    <span>Total Pembayaran</span>
                    <strong id="bottom-total">Rp 0</strong>
                </div>
                <button class="pay-btn" onclick="processPayment()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    Lanjut Pembayaran
                </button>
            </div>
        </div>

    </div>
    <script src="checkout.js?v=1781634589718"></script>
</body>
</html>
