<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kedai Siap Salah - Checkout</title>
    <link rel="stylesheet" href="style.css?v=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="menu-body">
    <div class="mobile-app payment-app">
        
        <!-- Header -->
        <header class="payment-header">
            <button class="back-btn" onclick="window.location.href='checkout.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="#A83200" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <h1 class="payment-title">Checkout</h1>
            <div class="placeholder-icon" style="width: 40px;"></div>
        </header>

        <!-- Scrollable content -->
        <div class="payment-scroll-area">
            
            <!-- Informasi Pemesan -->
            <div class="payment-card">
                <h2 class="payment-card-title">Informasi Pemesan</h2>
                
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#A83200" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <input type="text" id="cust-name" placeholder="Masukkan nama Anda">
                    </div>
                </div>

                <div class="form-group">
                    <label>Nomor WhatsApp</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#A83200" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                        <input type="tel" id="cust-phone" placeholder="Contoh: 08123456789">
                    </div>
                    <span class="input-help">Untuk menerima notifikasi status pesanan via WhatsApp.</span>
                </div>

                <div class="form-group">
                    <label>Nomor Meja</label>
                    <div class="input-wrapper disabled-input">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="#A83200" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h18"/><path d="M5 8l-2 11"/><path d="M19 8l2 11"/><path d="M4 14h16"/></svg>
                        <input type="text" id="cust-table" value="Meja 12" readonly>
                    </div>
                </div>

            </div>

            <!-- Metode Pembayaran -->
            <div class="payment-card">
                <h2 class="payment-card-title">Metode Pembayaran</h2>
                
                <div class="payment-methods">
                    <label class="method-option active">
                        <input type="radio" name="payment_method" value="qris" checked class="hidden-radio">
                        <div class="method-icon-wrap">
                            <svg class="method-icon" viewBox="0 0 24 24" fill="none" stroke="#584237" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="7" y="7" width="3" height="3"></rect><rect x="14" y="7" width="3" height="3"></rect><rect x="7" y="14" width="3" height="3"></rect><rect x="14" y="14" width="3" height="3"></rect></svg>
                        </div>
                        <div class="method-info">
                            <span class="method-name">QRIS</span>
                            <span class="method-desc">Pembayaran Digital</span>
                        </div>
                    </label>

                    <label class="method-option">
                        <input type="radio" name="payment_method" value="cash" class="hidden-radio">
                        <div class="method-icon-wrap">
                            <svg class="method-icon" viewBox="0 0 24 24" fill="none" stroke="#584237" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
                        </div>
                        <div class="method-info">
                            <span class="method-name">Bayar Tunai</span>
                            <span class="method-desc">Pembayaran di Kasir</span>
                        </div>
                    </label>
                </div>
            </div>

        </div>

        <!-- Sticky Bottom -->
        <div class="payment-bottom">
            <div class="payment-summary-box">
                <div class="summary-row">
                    <span class="summary-label">Subtotal <small id="summary-items">(0 menu)</small></span>
                    <span class="summary-val" id="summary-subtotal">Rp 0</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">Pajak PPN (11%)</span>
                    <span class="summary-val" id="summary-tax">Rp 0</span>
                </div>
                <div class="summary-divider"></div>
                <div class="summary-row total">
                    <span class="summary-label">Total Akhir</span>
                    <span class="summary-val total-val" id="summary-total">Rp 0</span>
                </div>
            </div>

            <button class="pay-now-btn" onclick="processFinalPayment()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Bayar Sekarang
            </button>
            <div class="secure-text">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Pembayaran Anda aman dan terenkripsi
            </div>
        </div>

    </div>
    <script src="payment.js?v=1"></script>
</body>
</html>
